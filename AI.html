  <meta charset="UTF-8">
  <title>Joke Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 20px;
    }

    #joke {
      font-size: 18px;
      margin: 20px 0;
      min-height: 60px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>😂 Joke Generator</h1>
    <div id="joke">Click the button to get a joke!</div>
    <button onclick="generateJoke()">Tell Me a Joke</button>
  </div>

  <script>
    const jokes = [
      "Why don’t skeletons fight each other? They don’t have the guts.",
      "I told my computer I needed a break… and it said no problem—it froze.",
      "Why did the math book look sad? Because it had too many problems.",
      "Why don’t programmers like nature? Too many bugs.",
      "What do you call fake spaghetti? An impasta.",
      "Why did the scarecrow win an award? Because he was outstanding in his field.",
      "Why can’t your nose be 12 inches long? Because then it would be a foot.",
      "Why did the golfer bring two pairs of pants? In case he got a hole in one.",
      "What do you call cheese that isn’t yours? Nacho cheese.",
      "Why did the bicycle fall over? Because it was two-tired."
    ];

    function generateJoke() {
      const randomIndex = Math.floor(Math.random() * jokes.length);
      document.getElementById("joke").textContent = jokes[randomIndex];
    }
  </script>

</body>
</html>
